[paths]
train = "data/wiki_train_s.spacy"
dev = "data/wiki_dev_s.spacy"
vectors = null

[system]
gpu_allocator = "pytorch"
seed = 0

[nlp]
lang = "de"
pipeline = ["transformer", "ner", "tagger", "morphologizer", "senter", "entity_linker"]
batch_size = 32

[components]

[components.transformer]
factory = "transformer"
max_batch_items = 1024

[components.transformer.model]
@architectures = "spacy-transformers.TransformerModel.v3"
name = "dbmdz/bert-base-german-cased"
tokenizer_config = {"use_fast": true}

[components.transformer.model.get_spans]
@span_getters = "spacy-transformers.strided_spans.v1"
window = 512
stride = 256

[components.transformer.set_extra_annotations]
@annotation_setters = "spacy-transformers.null_annotation_setter.v1"

[components.ner]
source = "de_core_news_sm"

[components.tagger]
source = "de_core_news_sm"

[components.morphologizer]
source = "de_core_news_sm"

[components.senter]
source = "de_core_news_sm"

[components.entity_linker]
factory = "entity_linker"
threshold = 0.5
incl_prior = true
entity_vector_length = 768
n_sents = 1
use_gold_ents = true
incl_context = true

[components.entity_linker.model]
@architectures = "spacy.EntityLinker.v2"
nO = null

[components.entity_linker.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0
upstream = "transformer"

[components.entity_linker.model.tok2vec.pooling]
@layers = "reduce_mean.v1"

[corpora]

[corpora.train]
@readers = "spacy.Corpus.v1"
path = ${paths.train}
max_length = 0

[corpora.dev]
@readers = "spacy.Corpus.v1"
path = ${paths.dev}
max_length = 0

[training]
accumulate_gradient = 1
dev_corpus = "corpora.dev"
train_corpus = "corpora.train"
seed = ${system.seed}
gpu_allocator = ${system.gpu_allocator}
patience = 0
max_epochs = 100
eval_frequency = 10
frozen_components = ["ner", "tagger", "morphologizer", "senter"]
annotating_components = ["ner", "tagger", "morphologizer", "senter"]

[training.optimizer]
@optimizers = "Adam.v1"

[training.optimizer.learn_rate]
@schedules = "slanted_triangular.v1"
max_rate = 0.00005
num_steps = 1000

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = true
size = 1000

[training.score_weights]
ents_f = 0.5
ents_p = null
ents_r = null
sents_f = null
sents_p = null
sents_r = null
nel_micro_f = 0.5
nel_micro_p = null
nel_micro_r = null

[initialize]
vectors = ${paths.vectors}

[initialize.components]

[initialize.components.transformer]

[initialize.components.ner]
source = "de_core_news_sm"

[initialize.components.tagger]
source = "de_core_news_sm"

[initialize.components.morphologizer]
source = "de_core_news_sm"

[initialize.components.senter]
source = "de_core_news_sm"

[initialize.components.entity_linker]

[initialize.components.entity_linker.kb_loader]
@misc = "spacy.KBFromFile.v1"
kb_path = "data/dodis_wikidata.kb"
